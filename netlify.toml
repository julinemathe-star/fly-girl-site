# Netlify configuration for Fly Girl Events & Design
# No build step — this is a pre-built static site, deployed as-is.

[build]
  publish = "."

# Long-lived caching for heavy, unchanging assets. If any of these files
# are ever replaced (new video, new photos, new icons), rename the file
# rather than overwriting it in place, so browsers/CDN fetch the new one
# immediately instead of serving a stale cached copy.

[[headers]]
  for = "/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages revalidate on every visit, so copy edits go live immediately
# without visitors needing to hard-refresh.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
